name = "kawaii"
main = "src/index.ts"
compatibility_date = "2026-04-16"

# Cloudflare AI binding (optional)
[ai]
binding = "AI"

# Cloudflare KV — routes are stored here instead of env vars
# Run `wrangler kv:namespace create "kawai-kv"` and replace the IDs below
[[kv_namespaces]]
binding = "KAWAI_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID"

# Cloudflare dashboard logs (optional)
[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = false

# Secret to set in Cloudflare Dashboard:
# - PROXY_AUTH_TOKEN
# - ANTHROPIC_KEY_1, GOOGLE_KEY_1, OPENAI_KEY_1, etc.

# ── Seed data (optional) ──────────────────────────────────────────────────
# After creating the KV namespace, upload your initial config with:
#
#   wrangler kv:key put --namespace-id=YOUR_KV_NAMESPACE_ID "routes-config" --path=config.json
#
# Or use the Admin API at runtime:
#   curl -X POST https://ai-proxy.YOUR-USERNAME.workers.dev/v1/admin/routes \
#     -H "Authorization: Bearer YOUR_PROXY_AUTH_TOKEN" \
#     -H "Content-Type: application/json" \
#     -d '{"model":"fast","providers":[{"provider":"google","model":"gemini-2.0-flash","apiKeys":["GOOGLE_KEY_1"]}]}'